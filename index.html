<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo</title>
  <meta name="description" content="Catálogo de remeras deportivas.">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">

  <!-- config.js primero: define la marca y aplica el tema (colores). -->
  <script src="js/config.js"></script>
</head>
<body>

  <div class="contenedor">

    <!-- Logo y marca -->
    <header class="header">
      <img src="assets/logo.png" alt="GAMBETA" class="header__logo-img" id="marca">
      <div class="header__subtitulo" id="subtitulo"></div>
    </header>

    <!-- Buscador -->
    <section class="seccion">
      <label class="buscador">
        <svg class="buscador__icono" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input id="buscador" class="buscador__input" type="search"
               placeholder="Buscar diseño..." aria-label="Buscar diseño">
      </label>
    </section>

    <!-- Filtro por color (desplegable) -->
    <section class="seccion--ajustada">
      <button id="filtro-toggle" class="filtro__toggle"
              type="button" aria-expanded="false" aria-controls="filtro-panel">
        <span class="filtro__toggle-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="7" y1="12" x2="17" y2="12"></line>
            <line x1="10" y1="18" x2="14" y2="18"></line>
          </svg>
          Filtrar por color
        </span>
        <svg class="filtro__chevron" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div id="filtro-panel" class="filtro__panel"></div>
    </section>

    <!-- Grilla de productos -->
    <section class="seccion">
      <div class="seccion-label">Diseños</div>
      <div id="grilla" class="grilla"></div>
    </section>

  </div>

  <!-- Lógica: el orden importa (config y data antes que el resto). -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
